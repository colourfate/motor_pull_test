[env:pico]
platform = raspberrypi
board = pico
framework = arduino
lib_deps =
    olikraus/U8g2
    bogde/HX711
    RobTillaart/INA226

[env:dshot_demo]
platform = raspberrypi
board = pico
framework = arduino
src_dir = examples/dshot_demo

[env:power_demo]
platform = raspberrypi
board = pico
framework = arduino
src_dir = examples/power_demo
lib_deps =
    RobTillaart/INA226

[env:thrust_demo]
platform = raspberrypi
board = pico
framework = arduino
src_dir = examples/thrust_demo
lib_deps =
    bogde/HX711
    RobTillaart/INA226

[env:calibrate_thrust]
platform = raspberrypi
board = pico
framework = arduino
src_dir = examples/calibrate_thrust
lib_deps =
    bogde/HX711
    RobTillaart/INA226
